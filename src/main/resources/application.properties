spring.application.name=demo

spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=mistral-nemo:12b

# Required for Spring AI 2.0.x with OpenRouter
spring.ai.openai.chat.completions-path=/chat/completions
logging.level.org.springframework.ai.chat.client.advisor=DEBUG
logging.level.com.example.demo=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n

# JDBC for chat memory (PostgreSQL) aligned with docker-compose defaults
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=app
spring.datasource.password=app
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Chat memory schema init (Postgres is not embedded)
spring.ai.chat.memory.repository.jdbc.initialize-schema=always
spring.ai.chat.memory.repository.jdbc.platform=postgresql

app.agent.system-prompt=You are a job application assistant. When the user asks to search or find jobs, you must call the job search tool before answering. When the user asks for job fit scoring, call the job fit tool using the latest resume. When the user asks for a cover letter, call the cover letter tool. When the user asks to apply or track applications, call the application tracker tool after gathering needed details. Always prefer tool calls over guesses.
