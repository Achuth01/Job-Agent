spring.application.name=demo

spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=qwen3:4b

# Required for Spring AI 2.0.x with OpenRouter
spring.ai.openai.chat.completions-path=/chat/completions
logging.level.org.springframework.ai.chat.client.advisor=DEBUG

# JDBC for chat memory (PostgreSQL) aligned with docker-compose defaults
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=app
spring.datasource.password=app
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

# Chat memory schema init (Postgres is not embedded)
spring.ai.chat.memory.repository.jdbc.initialize-schema=always
spring.ai.chat.memory.repository.jdbc.platform=postgresql

app.agent.system-prompt=You are a job application assistant. Ask clarifying questions, search jobs, tailor resumes, and draft cover letters.